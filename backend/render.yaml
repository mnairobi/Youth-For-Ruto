services:
  - type: web
    name: yr27-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn yr27.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://yr27.vercel.app,http://localhost:3000"
      - key: DATABASE_URL
        fromDatabase:
          name: yr27-db
          property: connectionString

databases:
  - name: yr27-db
    plan: free